name: Sync Activity

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: sync-activity-production
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  GH_REPO: ${{ github.repository }}
  GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
  SYNC_BRANCH: automation/sync-activity
  SYNC_COMMIT_MESSAGE: "chore(activity): sync external activity"
  SYNC_PR_TITLE: "chore(activity): sync external activity"

jobs:
  sync:
    name: sync
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_BOT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync external activity
        run: npm run sync:activity

      - name: Detect activity diff
        id: diff
        run: |
          if git diff --quiet --exit-code -- src/generated/activity.json; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_diff=true" >> "$GITHUB_OUTPUT"

      - name: Close stale sync pull request
        if: ${{ steps.diff.outputs.has_diff != 'true' }}
        run: |
          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --base master --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr close "$pr_number" --delete-branch
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$SYNC_BRANCH"
          fi

      - name: Configure git author
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit activity update
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          git switch -C "$SYNC_BRANCH"
          git add src/generated/activity.json
          git commit -m "$SYNC_COMMIT_MESSAGE"

      - name: Push sync branch
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: git push --force origin "HEAD:$SYNC_BRANCH"

      - name: Create or update pull request
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          body_file="$(mktemp)"
          cat <<'EOF' > "$body_file"
          This pull request was generated by the daily external activity sync workflow.

          Sources:
          - Zenn feed
          - GitHub Releases
          EOF

          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --base master --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$SYNC_PR_TITLE" --body-file "$body_file"
            exit 0
          fi

          gh pr create --base master --head "$SYNC_BRANCH" --title "$SYNC_PR_TITLE" --body-file "$body_file"
