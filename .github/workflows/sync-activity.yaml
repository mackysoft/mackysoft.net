name: Sync Activity

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: sync-activity-production
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_BRANCH: automation/sync-activity
  SYNC_COMMIT_MESSAGE: "chore(activity): sync external activity"
  SYNC_PR_TITLE: "chore(activity): sync external activity"

jobs:
  sync:
    name: sync
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_BOT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync external activity
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
        run: npm run sync:activity

      - name: Detect activity diff
        id: diff
        run: |
          if git diff --quiet --exit-code -- src/generated/activity.json; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_diff=true" >> "$GITHUB_OUTPUT"

      - name: Close stale sync pull request
        if: ${{ steps.diff.outputs.has_diff != 'true' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_BOT_TOKEN }}
          script: |
            const headBranch = process.env.SYNC_BRANCH;
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: "master",
              head: `${owner}:${headBranch}`,
              per_page: 1,
            });

            if (pulls.length) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls[0].number,
                state: "closed",
              });
              core.info(`Closed stale sync pull request #${pulls[0].number}.`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${headBranch}`,
              });
              core.info(`Deleted remote branch ${headBranch}.`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.info(`Remote branch ${headBranch} does not exist.`);
                return;
              }

              throw error;
            }

      - name: Configure git author
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit activity update
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          git switch -C "$SYNC_BRANCH"
          git add src/generated/activity.json
          git commit -m "$SYNC_COMMIT_MESSAGE"

      - name: Push sync branch
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: git push --force origin "HEAD:$SYNC_BRANCH"

      - name: Create or update pull request
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_BOT_TOKEN }}
          script: |
            const headBranch = process.env.SYNC_BRANCH;
            const title = process.env.SYNC_PR_TITLE;
            const body = [
              "This pull request was generated by the daily external activity sync workflow.",
              "",
              "Sources:",
              "- Zenn feed",
              "- GitHub Releases",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: "master",
              head: `${owner}:${headBranch}`,
              per_page: 1,
            });

            if (pulls.length) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls[0].number,
                title,
                body,
              });
              core.info(`Updated sync pull request #${pulls[0].number}.`);
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              base: "master",
              head: headBranch,
              title,
              body,
            });
            core.info(`Created sync pull request #${pull.number}.`);
