name: Merge Sync Activity

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: merge-sync-activity
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_BRANCH: automation/sync-activity

jobs:
  merge:
    name: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'automation/sync-activity'
    steps:
      - name: Merge sync pull request
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_BOT_TOKEN }}
          script: |
            const headBranch = process.env.SYNC_BRANCH;
            const { owner, repo } = context.repo;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: "master",
              head: `${owner}:${headBranch}`,
              per_page: 1,
            });

            if (!pulls.length) {
              core.info("No open sync pull request found.");
              return;
            }

            const pullNumber = pulls[0].number;
            let pull;

            for (let attempt = 0; attempt < 6; attempt += 1) {
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });
              pull = response.data;

              if (pull.mergeable_state && pull.mergeable_state !== "unknown") {
                break;
              }

              await sleep(5000);
            }

            if (!pull?.mergeable_state || pull.mergeable_state === "unknown") {
              core.setFailed(`Unable to resolve mergeable state for #${pullNumber}.`);
              return;
            }

            if (pull.mergeable_state === "behind") {
              await github.rest.pulls.updateBranch({
                owner,
                repo,
                pull_number: pullNumber,
                expected_head_sha: pull.head.sha,
              });
              core.info(`Updated sync pull request #${pullNumber} with the latest master branch.`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pullNumber,
                merge_method: "squash",
                sha: pull.head.sha,
              });
            } catch (error) {
              if (error.status === 405 || error.status === 409) {
                const refreshed = (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pullNumber,
                })).data;

                if (refreshed.mergeable_state === "behind") {
                  await github.rest.pulls.updateBranch({
                    owner,
                    repo,
                    pull_number: pullNumber,
                    expected_head_sha: refreshed.head.sha,
                  });
                  core.info(`Sync pull request #${pullNumber} fell behind master and was updated.`);
                  return;
                }
              }

              throw error;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${headBranch}`,
              });
              core.info(`Deleted remote branch ${headBranch}.`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.info(`Remote branch ${headBranch} was already removed.`);
                return;
              }

              throw error;
            }
