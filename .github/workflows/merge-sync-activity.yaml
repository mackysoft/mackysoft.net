name: Merge Sync Activity

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: merge-sync-activity
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_BRANCH: automation/sync-activity

jobs:
  merge:
    name: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'automation/sync-activity'
    steps:
      - name: Merge sync pull request
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
        run: |
          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --base master --json number --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            echo "No open sync pull request found."
            exit 0
          fi

          gh pr merge "$pr_number" --squash --delete-branch
